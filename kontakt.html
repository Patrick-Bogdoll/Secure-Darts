<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kontakt - Secure-Darts</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
      :root {
        --bg-color: #1a1a1a;
        --text-color: #f0f0f0;
        --card-bg: #2d2d2d;
        --accent-blue: #2196f3;
        --accent-green: #4caf50;
        --accent-red: #f44336;
      }
      body {
        font-family: sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        margin: 0;
      }
      .container {
        background: var(--card-bg);
        padding: 30px;
        border-radius: 12px;
        width: 100%;
        max-width: 500px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        margin-top: 20px;
        box-sizing: border-box;
      }
      input,
      textarea {
        width: 100%;
        padding: 15px;
        margin-bottom: 20px;
        border-radius: 8px;
        border: 1px solid #444;
        background: #111;
        color: white;
        box-sizing: border-box;
        font-family: inherit;
        font-size: 1em;
      }
      input:focus,
      textarea:focus {
        outline: none;
        border-color: var(--accent-blue);
      }
      button.submit-btn {
        width: 100%;
        padding: 15px;
        background: var(--accent-blue);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        font-size: 1.1em;
        cursor: pointer;
        transition: 0.3s;
      }
      button.submit-btn:hover {
        background: #1976d2;
      }
      .btn-home {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        background-color: #444;
        color: white;
        padding: 10px 15px;
        border-radius: 6px;
        font-weight: bold;
        margin-bottom: 20px;
        transition: 0.3s;
      }
      .btn-home:hover {
        background-color: #555;
      }
    </style>
  </head>
  <body>
    <a href="index.html" class="btn-home">🏠 Zurück zur App</a>

    <div class="container">
      <h2 style="text-align: center; color: var(--accent-blue); margin-top: 0">
        ✉️ Kontakt
      </h2>
      <p
        style="
          text-align: center;
          color: #aaa;
          font-size: 0.95em;
          margin-bottom: 25px;
          line-height: 1.5;
        "
      >
        Hast du Fragen oder Feedback? Schreib uns direkt! Die Nachricht wird im
        Admin-Panel gespeichert und per E-Mail an uns weitergeleitet.
      </p>

      <input type="text" id="contact-name" placeholder="Dein Name (Optional)" />
      <input
        type="email"
        id="contact-email"
        placeholder="Deine E-Mail Adresse *"
        required
      />
      <textarea
        id="contact-message"
        rows="6"
        placeholder="Deine Nachricht *"
        required
      ></textarea>

      <button id="btn-submit" class="submit-btn" onclick="submitContactForm()">
        Nachricht Senden
      </button>
    </div>

    <div
      id="toast-container"
      style="
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 999999;
        display: flex;
        flex-direction: column;
        gap: 10px;
      "
    ></div>

    <script>
      const SUPABASE_URL = "https://etzkulwnjhkoiklrohbt.supabase.co";
      const SUPABASE_KEY = "sb_publishable_mSGY3nB8ivTaASBZQass3g_Ri4xOimy";
      const { createClient } = supabase;
      const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
      const FORMSPREE_URL = "https://formspree.io/f/mnjboqwo"; // Deine Formspree ID

      // TOAST NOTIFICATION
      function showToast(message, type = "success") {
        const container = document.getElementById("toast-container");
        if (!container) return;
        const toast = document.createElement("div");
        const bgColor =
          type === "success" ? "var(--accent-green)" : "var(--accent-red)";
        const color = type === "success" ? "black" : "white";
        const icon = type === "success" ? "✅" : "⚠️";

        toast.style.cssText = `background: ${bgColor}; color: ${color}; padding: 12px 20px; border-radius: 8px; box-shadow: 0 6px 20px rgba(0,0,0,0.6); font-weight: bold; font-size: 0.9em; display: flex; align-items: center; gap: 10px; transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);`;
        toast.innerHTML = `<span style="font-size: 1.2em;">${icon}</span> <span>${message}</span>`;
        container.appendChild(toast);
        requestAnimationFrame(() => (toast.style.transform = "translateX(0)"));
        setTimeout(() => {
          toast.style.transform = "translateX(120%)";
          setTimeout(() => toast.remove(), 400);
        }, 2500);
      }

      // AUTO-FILL
      window.addEventListener("DOMContentLoaded", async () => {
        const {
          data: { session },
        } = await _supabase.auth.getSession();
        if (session && session.user) {
          document.getElementById("contact-email").value = session.user.email;
          const name =
            session.user.user_metadata?.display_name ||
            session.user.user_metadata?.full_name ||
            "";
          if (name) document.getElementById("contact-name").value = name;
        }
      });

      // ABSENDEN LOGIK
      async function submitContactForm() {
        const name = document.getElementById("contact-name").value.trim();
        const email = document.getElementById("contact-email").value.trim();
        const message = document.getElementById("contact-message").value.trim();

        if (!email)
          return showToast("Bitte gib eine E-Mail Adresse an!", "error");
        if (!email.includes("@"))
          return showToast("Bitte gib eine gültige E-Mail an!", "error");
        if (!message)
          return showToast("Deine Nachricht darf nicht leer sein!", "error");

        const btn = document.getElementById("btn-submit");
        btn.innerText = "Wird gesendet...";
        btn.disabled = true;

        try {
          // 1. In Supabase speichern (für dein Admin-Panel)
          const { error: sbError } = await _supabase
            .from("contact_messages")
            .insert([{ name: name, email: email, message: message }]);
          if (sbError) throw new Error("Supabase Fehler: " + sbError.message);

          // 2. An Formspree senden (für deine E-Mail Benachrichtigung)
          const response = await fetch(FORMSPREE_URL, {
            method: "POST",
            body: JSON.stringify({ name, email, message }),
            headers: {
              "Content-Type": "application/json",
              Accept: "application/json",
            },
          });

          if (response.ok) {
            showToast("Nachricht erfolgreich gesendet!", "success");
            document.getElementById("contact-message").value = "";
          } else {
            showToast(
              "E-Mail Weiterleitung fehlgeschlagen, aber im Admin-Panel gespeichert.",
              "error"
            );
          }
        } catch (err) {
          showToast(err.message, "error");
        } finally {
          btn.innerText = "Nachricht Senden";
          btn.disabled = false;
        }
      }
    </script>
  </body>
</html>
