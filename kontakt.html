<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kontakt - Secure-Darts</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div
      class="container glass-panel accent-blue"
      style="margin-top: 4vh; max-width: 500px; padding: 30px"
    >
      <a
        href="index.html"
        class="reset"
        style="
          display: inline-flex;
          align-items: center;
          gap: 8px;
          text-decoration: none;
          width: auto;
          margin-top: 0;
          margin-bottom: 30px;
        "
      >
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        ZURÜCK ZUR APP
      </a>

      <h1
        style="
          color: var(--accent-blue);
          text-align: center;
          margin-bottom: 10px;
        "
      >
        KONTAKT
      </h1>
      <p
        style="
          text-align: center;
          color: var(--text-muted);
          font-size: 0.95em;
          margin-bottom: 25px;
          line-height: 1.5;
        "
      >
        Hast du Fragen oder Feedback? Schreib uns direkt! Wichtige Anliegen
        werden an uns per E-Mail weitergeleitet, alles Weitere wird im
        Admin-Panel gespeichert.
      </p>

      <input
        type="text"
        id="contact-name"
        placeholder="Dein Name (Optional)"
        style="margin-bottom: 15px"
      />
      <input
        type="email"
        id="contact-email"
        placeholder="Deine E-Mail Adresse *"
        required
        style="margin-bottom: 15px"
      />

      <select
        id="contact-category"
        style="
          width: 100%;
          padding: 15px;
          border-radius: 8px;
          border: 1px solid var(--glass-border);
          background: rgba(0, 0, 0, 0.2);
          color: var(--text-main);
          font-size: 1.1em;
          margin-bottom: 15px;
          outline: none;
          font-family: inherit;
          appearance: auto;
        "
      >
        <option value="Allgemein" style="color: white">
          Allgemeine Anfrage
        </option>
        <option value="Feedback" style="color: white">Feedback / Ideen</option>
        <option value="Wichtig" style="color: white">Wichtiges Anliegen</option>
        <option value="Bug" style="color: white">Technischer Fehler</option>
      </select>

      <textarea
        id="contact-message"
        rows="6"
        placeholder="Deine Nachricht *"
        required
        style="
          width: 100%;
          padding: 15px;
          border-radius: 8px;
          border: 1px solid var(--glass-border);
          background: rgba(0, 0, 0, 0.2);
          color: var(--text-main);
          font-size: 1.1em;
          transition: border-color 0.3s, box-shadow 0.3s;
          outline: none;
          font-family: inherit;
          resize: vertical;
          margin-bottom: 20px;
        "
      ></textarea>

      <button
        id="btn-submit"
        class="primary accent-blue"
        style="margin: 0; text-align: center; justify-content: center"
        onclick="submitContactForm()"
      >
        NACHRICHT SENDEN
      </button>
    </div>

    <div
      id="toast-container"
      style="
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 999999;
        display: flex;
        flex-direction: column;
        gap: 10px;
      "
    ></div>

    <script>
      const SUPABASE_URL = "https://etzkulwnjhkoiklrohbt.supabase.co";
      const SUPABASE_KEY = "sb_publishable_mSGY3nB8ivTaASBZQass3g_Ri4xOimy";
      const { createClient } = supabase;
      const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
      const FORMSPREE_URL = "https://formspree.io/f/mnjboqwo";

      function showToast(message, type = "success") {
        const container = document.getElementById("toast-container");
        if (!container) return;
        const toast = document.createElement("div");
        const borderColor =
          type === "success" ? "var(--accent-green)" : "var(--accent-red)";

        toast.style.cssText = `background: var(--glass-bg); color: var(--text-main); border: 1px solid var(--glass-border); border-left: 4px solid ${borderColor}; padding: 12px 20px; border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); font-weight: bold; font-size: 0.9em; transform: translateX(120%); transition: transform 0.4s ease-out;`;
        toast.innerHTML = `<span>${message}</span>`;
        container.appendChild(toast);
        requestAnimationFrame(() => (toast.style.transform = "translateX(0)"));
        setTimeout(() => {
          toast.style.transform = "translateX(120%)";
          setTimeout(() => toast.remove(), 400);
        }, 2500);
      }

      window.addEventListener("DOMContentLoaded", async () => {
        const {
          data: { session },
        } = await _supabase.auth.getSession();
        if (session && session.user) {
          document.getElementById("contact-email").value = session.user.email;
          const name =
            session.user.user_metadata?.display_name ||
            session.user.user_metadata?.full_name ||
            "";
          if (name) document.getElementById("contact-name").value = name;
        }
      });

      async function submitContactForm() {
        const name = document.getElementById("contact-name").value.trim();
        const email = document.getElementById("contact-email").value.trim();
        const category = document.getElementById("contact-category").value;
        const rawMessage = document
          .getElementById("contact-message")
          .value.trim();

        if (!email)
          return showToast("Bitte gib eine E-Mail Adresse an!", "error");
        if (!email.includes("@"))
          return showToast("Bitte gib eine gültige E-Mail an!", "error");
        if (!rawMessage)
          return showToast("Deine Nachricht darf nicht leer sein!", "error");

        // Setzt die Kategorie vor die Nachricht, damit sie im Admin-Panel sichtbar ist
        const message = `[Kategorie: ${category}]\n\n${rawMessage}`;

        // Prüft, ob es an Formspree geschickt werden soll
        const isImportant = category === "Wichtig" || category === "Bug";

        const btn = document.getElementById("btn-submit");
        btn.innerText = "WIRD GESENDET...";
        btn.disabled = true;

        try {
          // 1. Immer in der Datenbank für das Admin-Panel speichern
          const { error: sbError } = await _supabase
            .from("contact_messages")
            .insert([{ name: name, email: email, message: message }]);
          if (sbError) throw new Error("Supabase Fehler: " + sbError.message);

          // 2. Nur wenn wichtig, per Mail (Formspree) weiterleiten
          if (isImportant) {
            const response = await fetch(FORMSPREE_URL, {
              method: "POST",
              body: JSON.stringify({ name, email, message, category }),
              headers: {
                "Content-Type": "application/json",
                Accept: "application/json",
              },
            });

            if (response.ok) {
              showToast(
                "Wichtige Nachricht gesendet & weitergeleitet!",
                "success"
              );
              document.getElementById("contact-message").value = "";
              document.getElementById("contact-category").value = "Allgemein";
            } else {
              showToast(
                "E-Mail Weiterleitung fehlgeschlagen, aber im Admin-Panel gespeichert.",
                "error"
              );
            }
          } else {
            // Wenn nicht wichtig, nur Toast anzeigen
            showToast(
              "Nachricht erfolgreich ans Admin-Panel gesendet!",
              "success"
            );
            document.getElementById("contact-message").value = "";
            document.getElementById("contact-category").value = "Allgemein";
          }
        } catch (err) {
          showToast(err.message, "error");
        } finally {
          btn.innerText = "NACHRICHT SENDEN";
          btn.disabled = false;
        }
      }
    </script>
  </body>
</html>
