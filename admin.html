<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure-Darts Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      :root {
        --bg-color: #1a1a1a;
        --text-color: #f0f0f0;
        --card-bg: #2d2d2d;
        --accent-red: #f44336;
        --accent-blue: #2196f3;
        --accent-green: #4caf50;
        --accent-purple: #9c27b0;
      }

      body {
        font-family: sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        width: 100%;
        max-width: 1100px;
        background: var(--card-bg);
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      }

      .header-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 20px;
      }

      .tab-btn {
        flex: 1;
        min-width: 150px;
        padding: 12px;
        background: #333;
        border: none;
        color: #aaa;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
      }

      .tab-btn.active {
        background: var(--accent-blue);
        color: white;
      }

      #tab-contact.active {
        background: var(--accent-purple);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }

      th,
      td {
        padding: 16px 15px;
        border-bottom: 1px solid #444;
        text-align: center;
      }

      th {
        background-color: #222;
        color: #bbb;
        text-transform: uppercase;
        font-size: 0.85em;
        letter-spacing: 1px;
      }

      th:first-child,
      td:first-child {
        text-align: center;
        width: 80px;
        color: #888;
      }
      th:last-child,
      td:last-child {
        text-align: right;
        white-space: nowrap;
      }

      .btn-edit,
      .btn-delete {
        padding: 6px 12px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        margin-right: 5px;
      }

      .btn-edit {
        background-color: #ffb300;
        color: #000;
      }
      .btn-delete {
        background-color: var(--accent-red);
        color: white;
      }

      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        backdrop-filter: blur(5px);
      }

      .modal-content {
        background: var(--card-bg);
        padding: 25px;
        border-radius: 12px;
        width: 90%;
        max-width: 600px;
        border: 2px solid var(--accent-blue);
        max-height: 90vh;
        overflow-y: auto;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-bottom: 25px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        text-align: left;
      }
      .form-group label {
        font-size: 0.85em;
        color: #aaa;
        margin-bottom: 5px;
      }
      .form-group input {
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #555;
        background: #111;
        color: white;
      }

      .modal-actions {
        display: flex;
        gap: 10px;
      }
      .modal-actions button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
      }
      .btn-save {
        background: var(--accent-green);
        color: black;
      }
      .btn-cancel {
        background: #555;
        color: white;
      }

      .btn-home {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        background-color: #444;
        color: white;
        padding: 10px 15px;
        border-radius: 6px;
        font-weight: bold;
        transition: 0.3s;
        margin-bottom: 20px;
        cursor: pointer;
      }

      #login-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--bg-color);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .login-box {
        background: var(--card-bg);
        padding: 40px;
        border-radius: 12px;
        text-align: center;
        width: 300px;
      }
    </style>
  </head>
  <body>
    <div
      id="toast-container"
      style="
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 999999;
        display: flex;
        flex-direction: column;
        gap: 10px;
      "
    ></div>

    <div
      id="generic-confirm-modal"
      class="modal-overlay"
      style="z-index: 100000"
    >
      <div
        class="modal-content"
        style="
          border: 2px solid var(--accent-red);
          text-align: center;
          max-width: 350px;
        "
      >
        <h2 style="color: var(--accent-red); margin-top: 0">Achtung!</h2>
        <p id="generic-confirm-text" style="color: #ccc; margin-bottom: 25px">
          Möchtest du das wirklich tun?
        </p>
        <div style="display: flex; gap: 10px; flex-direction: column">
          <button
            id="generic-confirm-yes-btn"
            style="
              background: var(--accent-red);
              color: white;
              padding: 12px;
              border: none;
              border-radius: 8px;
              font-weight: bold;
              cursor: pointer;
            "
          >
            Ja, unwiderruflich löschen
          </button>
          <button
            onclick="closeConfirmModal()"
            style="
              background: #333;
              color: white;
              padding: 12px;
              border: none;
              border-radius: 8px;
              font-weight: bold;
              cursor: pointer;
            "
          >
            Abbrechen
          </button>
        </div>
      </div>
    </div>

    <div id="login-overlay">
      <div class="login-box">
        <h2 style="color: var(--accent-blue); margin-top: 0">Admin Login</h2>
        <input
          type="password"
          id="admin-pw"
          placeholder="Passwort"
          style="
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #555;
            background: #111;
            color: white;
            margin-bottom: 20px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
          "
          onkeydown="if(event.key==='Enter') checkPassword()"
        />
        <button
          onclick="checkPassword()"
          style="
            padding: 12px 20px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            box-sizing: border-box;
          "
        >
          Einloggen
        </button>
        <a
          href="index.html"
          class="btn-home"
          style="
            margin-top: 15px;
            width: 100%;
            justify-content: center;
            box-sizing: border-box;
          "
          >🏠 Zurück</a
        >
      </div>
    </div>

    <div class="container" id="admin-container" style="display: none">
      <a href="index.html" class="btn-home">🏠 Zurück zur App</a>
      <h1 style="text-align: center; margin-top: 0">⚙️ Admin Panel</h1>
      <div class="header-tabs">
        <button
          id="tab-littler"
          class="tab-btn active"
          onclick="switchTab('littler')"
        >
          🎲 Secure-Darts
        </button>
        <button id="tab-501" class="tab-btn" onclick="switchTab('501')">
          🎯 501
        </button>
        <button id="tab-bobs" class="tab-btn" onclick="switchTab('bobs')">
          ⭕️ Bob's 27
        </button>
        <button id="tab-rtw" class="tab-btn" onclick="switchTab('rtw')">
          🌎 RTW
        </button>
        <button id="tab-contact" class="tab-btn" onclick="switchTab('contact')">
          ✉️ Nachrichten
        </button>
      </div>
      <div style="overflow-x: auto">
        <table id="data-table">
          <thead id="table-head"></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div id="edit-modal" class="modal-overlay">
      <div class="modal-content">
        <h2 id="modal-title" style="margin-top: 0; color: var(--accent-blue)">
          Spieler bearbeiten
        </h2>
        <div id="edit-fields" class="form-grid"></div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
          <button class="btn-save" onclick="saveData()">💾 Speichern</button>
        </div>
      </div>
    </div>

    <script>
      const SUPABASE_URL = "https://etzkulwnjhkoiklrohbt.supabase.co";
      const SUPABASE_KEY = "sb_publishable_mSGY3nB8ivTaASBZQass3g_Ri4xOimy";
      const { createClient } = supabase;
      const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
      const ADMIN_HASH =
        "d9cafea78ff95cf59f6925e0707c266b19cffb85a31bbbffd146f38b1f119ba8";

      let currentMode = "littler";
      let editingId = null;
      let pendingConfirmAction = null;

      function showToast(message, type = "success") {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");
        const bgColor =
          type === "success" ? "var(--accent-green)" : "var(--accent-red)";
        toast.style.cssText = `background: ${bgColor}; color: ${
          type === "success" ? "black" : "white"
        }; padding: 12px 20px; border-radius: 8px; box-shadow: 0 6px 20px rgba(0,0,0,0.6); font-weight: bold; transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);`;
        toast.innerHTML = message;
        container.appendChild(toast);
        requestAnimationFrame(() => (toast.style.transform = "translateX(0)"));
        setTimeout(() => {
          toast.style.transform = "translateX(120%)";
          setTimeout(() => toast.remove(), 400);
        }, 2500);
      }

      async function hashPassword(password) {
        const msgBuffer = new TextEncoder().encode(password);
        const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
        return Array.from(new Uint8Array(hashBuffer))
          .map((b) => b.toString(16).padStart(2, "0"))
          .join("");
      }

      async function checkPassword() {
        const input = document.getElementById("admin-pw").value;
        if ((await hashPassword(input)) === ADMIN_HASH) {
          document.getElementById("login-overlay").style.display = "none";
          document.getElementById("admin-container").style.display = "block";
          loadData();
        } else {
          alert("Falsches Passwort!");
        }
      }

      function switchTab(mode) {
        currentMode = mode;
        document
          .querySelectorAll(".tab-btn")
          .forEach((btn) =>
            btn.classList.toggle("active", btn.id === `tab-${mode}`)
          );
        loadData();
      }

      async function loadData() {
        const tbody = document.querySelector("#data-table tbody");
        const thead = document.getElementById("table-head");
        tbody.innerHTML =
          "<tr><td colspan='6' style='text-align:center;'>Lade Daten...</td></tr>";

        let tableName =
          currentMode === "littler"
            ? "highscores"
            : currentMode === "501"
            ? "stats_501"
            : currentMode === "bobs"
            ? "stats_bobs"
            : currentMode === "rtw"
            ? "stats_rtw"
            : "contact_messages";

        const { data, error } = await _supabase
          .from(tableName)
          .select("*")
          .order(currentMode === "contact" ? "created_at" : "id", {
            ascending: currentMode !== "contact",
          });

        if (error) return alert("Fehler: " + error.message);
        tbody.innerHTML = "";

        if (currentMode === "contact") {
          thead.innerHTML =
            "<tr><th>Datum</th><th>Name</th><th>E-Mail</th><th>Nachricht</th><th>Aktionen</th></tr>";
          data.forEach((p) => {
            let date = new Date(p.created_at).toLocaleString("de-DE", {
              day: "2-digit",
              month: "2-digit",
              year: "numeric",
              hour: "2-digit",
              minute: "2-digit",
            });
            const tr = document.createElement("tr");
            tr.innerHTML = `<td style="font-size: 0.8em; color: #888;">${date}</td><td><b>${
              p.name || "-"
            }</b></td><td><a href="mailto:${
              p.email
            }" style="color:var(--accent-blue)">${
              p.email
            }</a></td><td style="max-width:350px; white-space:pre-wrap; font-size: 0.9em;">${
              p.message
            }</td><td><button class="btn-delete" onclick="deleteRecord(${
              p.id
            }, 'Nachricht von ${
              p.name
            }', 'contact_messages')">🗑️</button></td>`;
            tbody.appendChild(tr);
          });
        } else {
          const is501 = currentMode === "501";
          thead.innerHTML = is501
            ? "<tr><th>ID</th><th>Name</th><th>Legs Won</th><th>Avg</th><th>Aktionen</th></tr>"
            : currentMode === "littler"
            ? "<tr><th>ID</th><th>Name</th><th>Siege</th><th>Highscore</th><th>Aktionen</th></tr>"
            : "<tr><th>ID</th><th>Name</th><th>Wert</th><th>Info</th><th>Aktionen</th></tr>";

          data.forEach((p) => {
            const tr = document.createElement("tr");
            let col3 = is501
              ? p.wins
              : currentMode === "littler"
              ? p.wins
              : currentMode === "bobs"
              ? p.final_score
              : p.total_points;
            let col4 = is501
              ? p.total_darts_thrown > 0
                ? ((p.total_score_thrown / p.total_darts_thrown) * 3).toFixed(2)
                : "0.00"
              : currentMode === "littler"
              ? p.highscore
              : currentMode === "bobs"
              ? p.is_win
                ? "Sieg"
                : "Bust"
              : p.mode;

            tr.innerHTML = `<td>${p.id}</td><td><b>${
              p.name
            }</b></td><td>${col3}</td><td>${col4}</td><td><button class="btn-edit" onclick="openEditModal(${
              p.id
            }, '${encodeURIComponent(
              JSON.stringify(p)
            )}')">✏️ Edit</button><button class="btn-delete" onclick="deleteRecord(${
              p.id
            }, '${p.name}', '${tableName}')">🗑️</button></td>`;
            tbody.appendChild(tr);
          });
        }
      }

      function openEditModal(id, encodedData) {
        editingId = id;
        const data = JSON.parse(decodeURIComponent(encodedData));
        const container = document.getElementById("edit-fields");
        container.innerHTML = "";
        Object.keys(data).forEach((key) => {
          if (["id", "created_at", "user_id"].includes(key)) return;
          container.innerHTML += `<div class="form-group"><label>${key}</label><input type="text" id="edit_${key}" value="${
            data[key] || ""
          }"></div>`;
        });
        document.getElementById("edit-modal").style.display = "flex";
      }

      async function saveData() {
        let tableName =
          currentMode === "littler"
            ? "highscores"
            : currentMode === "501"
            ? "stats_501"
            : currentMode === "bobs"
            ? "stats_bobs"
            : "stats_rtw";
        let payload = {};
        document.querySelectorAll("#edit-fields input").forEach((input) => {
          let key = input.id.replace("edit_", "");
          payload[key] =
            isNaN(input.value) || input.value === ""
              ? input.value
              : parseFloat(input.value);
        });
        const { error } = await _supabase
          .from(tableName)
          .update(payload)
          .eq("id", editingId);
        if (error) alert(error.message);
        else {
          showToast("Gespeichert!", "success");
          closeModal();
          loadData();
        }
      }

      function closeModal() {
        document.getElementById("edit-modal").style.display = "none";
      }
      function closeConfirmModal() {
        document.getElementById("generic-confirm-modal").style.display = "none";
      }

      function deleteRecord(id, name, table) {
        document.getElementById(
          "generic-confirm-text"
        ).innerText = `"${name}" wirklich löschen?`;
        document.getElementById("generic-confirm-modal").style.display = "flex";
        document.getElementById("generic-confirm-yes-btn").onclick =
          async () => {
            const { error } = await _supabase.from(table).delete().eq("id", id);
            if (error) showToast(error.message, "error");
            else {
              showToast("Gelöscht", "success");
              closeConfirmModal();
              loadData();
            }
          };
      }

      async function verifyAdmin() {
        const {
          data: { session },
        } = await _supabase.auth.getSession();
        if (!session) window.location.href = "index.html";
        const { data } = await _supabase
          .from("stats_501")
          .select("is_admin")
          .eq("user_id", session.user.id)
          .maybeSingle();
        if (!data?.is_admin) window.location.href = "index.html";
      }
      verifyAdmin();
    </script>
  </body>
</html>
