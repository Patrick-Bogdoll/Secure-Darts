<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure-Darts Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
      :root {
        --bg-color: #1a1a1a;
        --text-color: #f0f0f0;
        --card-bg: #2d2d2d;
        --accent-red: #f44336;
        --accent-blue: #2196f3;
        --accent-green: #4caf50;
        --accent-purple: #9c27b0;
      }

      body {
        font-family: sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        width: 100%;
        max-width: 1100px;
        background: var(--card-bg);
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      }

      .header-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 20px;
      }

      .tab-btn {
        flex: 1;
        min-width: 150px;
        padding: 12px;
        background: #333;
        border: none;
        color: #aaa;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
      }

      .tab-btn.active {
        background: var(--accent-blue);
        color: white;
      }

      #tab-contact.active {
        background: var(--accent-purple);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }

      th,
      td {
        padding: 16px 15px; /* Etwas mehr Luft oben/unten und an den Seiten */
        border-bottom: 1px solid #444;
      }

      th {
        background-color: #222;
        color: #bbb;
        text-transform: uppercase;
        font-size: 0.85em;
        letter-spacing: 1px;
      }

      /* 1. Spalte (ID / Datum): Zentriert und dezent */
      th:first-child,
      td:first-child {
        text-align: center;
        width: 80px;
        color: #888;
      }

      /* 2. Spalte (Name): Links ausgerichtet */
      th:nth-child(2),
      td:nth-child(2) {
        text-align: left;
      }

      /* 3. & 4. Spalte (Statistiken): Zentriert für perfekte Balance */
      th:nth-child(3),
      td:nth-child(3),
      th:nth-child(4),
      td:nth-child(4) {
        text-align: center;
      }

      /* 5. Spalte (Aktionen): Rechtsbündig an den Rand gepinnt */
      th:last-child,
      td:last-child {
        text-align: right;
        white-space: nowrap; /* Verhindert, dass Buttons untereinander rutschen */
      }

      .btn-edit,
      .btn-delete {
        padding: 6px 12px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        margin-right: 5px;
      }

      .btn-edit {
        background-color: #ffb300;
        color: #000;
      }
      .btn-delete {
        background-color: var(--accent-red);
        color: white;
      }

      /* --- DAS GROSSE BEARBEITUNGS-MODAL --- */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        backdrop-filter: blur(5px);
      }

      .modal-content {
        background: var(--card-bg);
        padding: 25px;
        border-radius: 12px;
        width: 90%;
        max-width: 600px;
        border: 2px solid var(--accent-blue);
        max-height: 90vh;
        overflow-y: auto;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-bottom: 25px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        text-align: left;
      }
      .form-group label {
        font-size: 0.85em;
        color: #aaa;
        margin-bottom: 5px;
      }
      .form-group input {
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #555;
        background: #111;
        color: white;
      }
      .form-group input:focus {
        outline: none;
        border-color: var(--accent-blue);
      }

      .modal-actions {
        display: flex;
        gap: 10px;
      }
      .modal-actions button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
      }
      .btn-save {
        background: var(--accent-green);
        color: black;
      }
      .btn-cancel {
        background: #555;
        color: white;
      }

      .btn-home {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        background-color: #444;
        color: white;
        padding: 10px 15px;
        border-radius: 6px;
        font-weight: bold;
        transition: 0.3s;
        margin-bottom: 20px;
        cursor: pointer;
      }
      .btn-home:hover {
        background-color: #555;
      }

      #login-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--bg-color);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .login-box {
        background: var(--card-bg);
        padding: 40px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        width: 300px;
      }
    </style>
  </head>
  <body>
    <div
      id="toast-container"
      style="
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 999999;
        display: flex;
        flex-direction: column;
        gap: 10px;
      "
    ></div>

    <div
      id="generic-confirm-modal"
      class="modal-overlay"
      style="z-index: 100000"
    >
      <div
        class="modal-content"
        style="
          border: 2px solid var(--accent-red);
          text-align: center;
          max-width: 350px;
        "
      >
        <h2 style="color: var(--accent-red); margin-top: 0">Achtung!</h2>
        <p id="generic-confirm-text" style="color: #ccc; margin-bottom: 25px">
          Möchtest du das wirklich tun?
        </p>

        <div style="display: flex; gap: 10px; flex-direction: column">
          <button
            id="generic-confirm-yes-btn"
            style="
              background: var(--accent-red);
              color: white;
              padding: 12px;
              border: none;
              border-radius: 8px;
              font-weight: bold;
              cursor: pointer;
            "
          >
            Ja, unwiderruflich löschen
          </button>
          <button
            onclick="closeConfirmModal()"
            style="
              background: #333;
              color: white;
              padding: 12px;
              border: none;
              border-radius: 8px;
              font-weight: bold;
              cursor: pointer;
            "
          >
            Abbrechen
          </button>
        </div>
      </div>
    </div>

    <div id="login-overlay">
      <div class="login-box">
        <h2 style="color: var(--accent-blue); margin-top: 0">Admin Login</h2>
        <input
          type="password"
          id="admin-pw"
          placeholder="Passwort"
          style="
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #555;
            background: #111;
            color: white;
            margin-bottom: 20px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
          "
          onkeydown="if(event.key==='Enter') checkPassword()"
        />
        <button
          onclick="checkPassword()"
          style="
            padding: 12px 20px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            box-sizing: border-box;
          "
        >
          Einloggen
        </button>
        <a
          href="index.html"
          class="btn-home"
          style="
            margin-top: 15px;
            width: 100%;
            justify-content: center;
            box-sizing: border-box;
          "
          >🏠 Zurück</a
        >
      </div>
    </div>

    <div class="container" id="admin-container" style="display: none">
      <a href="index.html" class="btn-home">🏠 Zurück zur App</a>
      <h1 style="text-align: center; margin-top: 0">⚙️ Admin Panel</h1>

      <div class="header-tabs">
        <button
          id="tab-littler"
          class="tab-btn active"
          onclick="switchTab('littler')"
        >
          🎲 Secure-Darts
        </button>
        <button id="tab-501" class="tab-btn" onclick="switchTab('501')">
          🎯 501
        </button>
        <button id="tab-bobs" class="tab-btn" onclick="switchTab('bobs')">
          ⭕️ Bob's 27
        </button>
        <button id="tab-rtw" class="tab-btn" onclick="switchTab('rtw')">
          🌎 RTW
        </button>
        <button id="tab-contact" class="tab-btn" onclick="switchTab('contact')">
          ✉️ Nachrichten
        </button>
      </div>

      <div style="overflow-x: auto">
        <table id="data-table">
          <thead id="table-head"></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div id="edit-modal" class="modal-overlay">
      <div class="modal-content">
        <h2 id="modal-title" style="margin-top: 0; color: var(--accent-blue)">
          Spieler/Match bearbeiten
        </h2>
        <div id="edit-fields" class="form-grid"></div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
          <button class="btn-save" onclick="saveData()">💾 Speichern</button>
        </div>
      </div>
    </div>

    <script>
      // ==========================================
      // TOAST NOTIFICATION & OVERRIDES
      // ==========================================
      function showToast(message, type = "success") {
        const container = document.getElementById("toast-container");
        if (!container) return;

        const toast = document.createElement("div");
        const bgColor =
          type === "success" ? "var(--accent-green)" : "var(--accent-red)";
        const color = type === "success" ? "black" : "white";
        const icon = type === "success" ? "✅" : "⚠️";

        toast.style.cssText = `
          background: ${bgColor}; color: ${color}; padding: 12px 20px; border-radius: 8px;
          box-shadow: 0 6px 20px rgba(0,0,0,0.6); font-weight: bold; font-size: 0.9em;
          display: flex; align-items: center; gap: 10px; transform: translateX(120%);
          transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        `;
        toast.innerHTML = `<span style="font-size: 1.2em;">${icon}</span> <span>${message}</span>`;
        container.appendChild(toast);

        requestAnimationFrame(() => (toast.style.transform = "translateX(0)"));
        setTimeout(() => {
          toast.style.transform = "translateX(120%)";
          setTimeout(() => toast.remove(), 400);
        }, 2500);
      }

      window.alert = function (message) {
        showToast(message, "error");
      };

      // ==========================================
      // CUSTOM CONFIRM MODAL
      // ==========================================
      let pendingConfirmAction = null;

      function showConfirmModal(message, confirmCallback) {
        document.getElementById("generic-confirm-text").innerText = message;
        pendingConfirmAction = confirmCallback;
        document.getElementById("generic-confirm-modal").style.display = "flex";

        document.getElementById("generic-confirm-yes-btn").onclick =
          function () {
            if (pendingConfirmAction) pendingConfirmAction();
            closeConfirmModal();
          };
      }

      function closeConfirmModal() {
        document.getElementById("generic-confirm-modal").style.display = "none";
        pendingConfirmAction = null;
      }

      // ==========================================
      // APP LOGIK
      // ==========================================
      const SUPABASE_URL = "https://etzkulwnjhkoiklrohbt.supabase.co";
      const SUPABASE_KEY = "sb_publishable_mSGY3nB8ivTaASBZQass3g_Ri4xOimy";
      const { createClient } = supabase;
      const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

      const ADMIN_HASH =
        "d9cafea78ff95cf59f6925e0707c266b19cffb85a31bbbffd146f38b1f119ba8";

      async function hashPassword(password) {
        const msgBuffer = new TextEncoder().encode(password);
        const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map((b) => b.toString(16).padStart(2, "0")).join("");
      }

      async function verifyAdmin() {
        const {
          data: { session },
        } = await _supabase.auth.getSession();
        if (!session) return (window.location.href = "index.html");
        const { data } = await _supabase
          .from("stats_501")
          .select("is_admin")
          .eq("user_id", session.user.id)
          .maybeSingle();
        if (!data || !data.is_admin) {
          alert("Zugriff verweigert!");
          window.location.href = "index.html";
        } else {
          document.getElementById("login-overlay").style.display = "flex";
        }
      }
      verifyAdmin();

      async function checkPassword() {
        const input = document.getElementById("admin-pw").value;
        const hash = await hashPassword(input);
        if (hash === ADMIN_HASH) {
          document.getElementById("login-overlay").style.display = "none";
          document.getElementById("admin-container").style.display = "block";
          loadData();
        } else {
          alert("Falsches Passwort!");
          document.getElementById("admin-pw").value = "";
        }
      }

      let currentMode = "littler";
      let editingId = null;

      function switchTab(mode) {
        currentMode = mode;
        const tabs = ["littler", "501", "bobs", "rtw", "contact"];
        tabs.forEach((t) => {
          let btn = document.getElementById(`tab-${t}`);
          if (btn) btn.classList.toggle("active", mode === t);
        });
        loadData();
      }

      async function loadData() {
        const tbody = document.querySelector("#data-table tbody");
        const thead = document.getElementById("table-head");
        tbody.innerHTML =
          "<tr><td colspan='6' style='text-align:center;'>Lade Daten...</td></tr>";

        if (currentMode === "littler") {
          thead.innerHTML =
            "<tr><th>ID</th><th>Name</th><th>Siege</th><th>Highscore</th><th>Aktionen</th></tr>";
          const { data, error } = await _supabase
            .from("highscores")
            .select("*")
            .order("id", { ascending: true });
          if (error) return alert("Fehler: " + error.message);

          tbody.innerHTML = "";
          data.forEach((p) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td>${p.id}</td><td><b>${p.name}</b></td><td>${
              p.wins
            }</td><td>${p.highscore}</td>
              <td>
                <button class="btn-edit" onclick="openEditModal(${
                  p.id
                }, '${encodeURIComponent(JSON.stringify(p))}')">✏️ Edit</button>
                <button class="btn-delete" onclick="deleteRecord(${p.id}, '${
              p.name
            }', 'highscores')">🗑️</button>
              </td>`;
            tbody.appendChild(tr);
          });
        } else if (currentMode === "501") {
          thead.innerHTML =
            "<tr><th>ID</th><th>Name</th><th>Legs Won</th><th>Avg</th><th>Aktionen</th></tr>";
          const { data, error } = await _supabase
            .from("stats_501")
            .select("*")
            .order("id", { ascending: true });
          if (error) return alert("Fehler: " + error.message);

          tbody.innerHTML = "";
          data.forEach((p) => {
            let avg =
              p.total_darts_thrown > 0
                ? ((p.total_score_thrown / p.total_darts_thrown) * 3).toFixed(2)
                : "0.00";
            const tr = document.createElement("tr");
            tr.innerHTML = `<td>${p.id}</td><td><b>${p.name}</b></td><td>${
              p.wins
            }</td><td>${avg}</td>
              <td>
                <button class="btn-edit" onclick="openEditModal(${
                  p.id
                }, '${encodeURIComponent(JSON.stringify(p))}')">✏️ Edit</button>
                <button class="btn-delete" onclick="deleteRecord(${p.id}, '${
              p.name
            }', 'stats_501')">🗑️</button>
              </td>`;
            tbody.appendChild(tr);
          });
        } else if (currentMode === "bobs") {
          thead.innerHTML =
            "<tr><th>ID</th><th>Name</th><th>Endstand</th><th>Sieg</th><th>Aktionen</th></tr>";
          const { data, error } = await _supabase
            .from("stats_bobs")
            .select("*")
            .order("created_at", { ascending: false });
          if (error) return alert("Fehler: " + error.message);

          tbody.innerHTML = "";
          data.forEach((p) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td>${p.id}</td><td><b>${p.name}</b></td><td>${
              p.final_score
            }</td><td style="color:${
              p.is_win ? "var(--accent-green)" : "var(--accent-red)"
            }; font-weight:bold;">${p.is_win ? "Sieg" : "Bust"}</td>
              <td>
                <button class="btn-edit" onclick="openEditModal(${
                  p.id
                }, '${encodeURIComponent(JSON.stringify(p))}')">✏️ Edit</button>
                <button class="btn-delete" onclick="deleteRecord(${
                  p.id
                }, 'Match von ${p.name}', 'stats_bobs')">🗑️</button>
              </td>`;
            tbody.appendChild(tr);
          });
        } else if (currentMode === "rtw") {
          thead.innerHTML =
            "<tr><th>ID</th><th>Name</th><th>Treffer</th><th>Modus</th><th>Aktionen</th></tr>";
          const { data, error } = await _supabase
            .from("stats_rtw")
            .select("*")
            .order("created_at", { ascending: false });
          if (error) return alert("Fehler: " + error.message);

          tbody.innerHTML = "";
          data.forEach((p) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td>${p.id}</td><td><b>${p.name}</b></td><td>${
              p.total_points
            }</td><td style="text-transform: capitalize;">${p.mode}</td>
              <td>
                <button class="btn-edit" onclick="openEditModal(${
                  p.id
                }, '${encodeURIComponent(JSON.stringify(p))}')">✏️ Edit</button>
                <button class="btn-delete" onclick="deleteRecord(${
                  p.id
                }, 'Match von ${p.name}', 'stats_rtw')">🗑️</button>
              </td>`;
            tbody.appendChild(tr);
          });
        } else if (currentMode === "contact") {
          tr.innerHTML = `
              <td style="font-size: 0.8em; color: #888;">${date}</td>
              <td style="text-align: left;"><b>${p.name || "-"}</b></td>
              <td style="text-align: left;"><a href="mailto:${
                p.email
              }" style="color:var(--accent-blue)">${p.email || "-"}</a></td>
              <td style="text-align: left; max-width:350px; white-space:pre-wrap; font-size: 0.9em; line-height: 1.4;">${
                p.message || "-"
              }</td>
              <td>
                <button class="btn-delete" onclick="deleteRecord(${
                  p.id
                }, 'Nachricht von ${p.name}', 'contact_messages')">🗑️</button>
              </td>`;
          const { data, error } = await _supabase
            .from("contact_messages")
            .select("*")
            .order("created_at", { ascending: false });
          if (error) return alert("Fehler: " + error.message);

          tbody.innerHTML = "";
          if (data.length === 0) {
            tbody.innerHTML =
              "<tr><td colspan='5' style='text-align:center; color:#888;'>Keine Nachrichten vorhanden.</td></tr>";
          }
          data.forEach((p) => {
            let date = new Date(p.created_at).toLocaleDateString("de-DE", {
              day: "2-digit",
              month: "2-digit",
              year: "numeric",
              hour: "2-digit",
              minute: "2-digit",
            });
            const tr = document.createElement("tr");
            tr.innerHTML = `
              <td style="font-size: 0.8em; color: #888;">${date}</td>
              <td><b>${p.name || "-"}</b></td>
              <td><a href="mailto:${
                p.email
              }" style="color:var(--accent-blue)">${p.email || "-"}</a></td>
              <td style="max-width:350px; white-space:pre-wrap; font-size: 0.9em; line-height: 1.4;">${
                p.message || "-"
              }</td>
              <td>
                <button class="btn-delete" onclick="deleteRecord(${
                  p.id
                }, 'Nachricht von ${p.name}', 'contact_messages')">🗑️</button>
              </td>`;
            tbody.appendChild(tr);
          });
        }
      }

      function openEditModal(id, encodedData) {
        editingId = id;
        const data = JSON.parse(decodeURIComponent(encodedData));
        const fieldsContainer = document.getElementById("edit-fields");
        fieldsContainer.innerHTML = "";

        const createField = (key, label, value, type = "number") => {
          return `<div class="form-group"><label>${label}</label><input type="${type}" id="edit_${key}" value="${
            value !== null ? value : ""
          }"></div>`;
        };

        if (currentMode === "littler") {
          fieldsContainer.innerHTML += createField(
            "name",
            "Spieler Name",
            data.name,
            "text"
          );
          fieldsContainer.innerHTML += createField("wins", "Siege", data.wins);
          fieldsContainer.innerHTML += createField(
            "highscore",
            "Highscore",
            data.highscore
          );
          fieldsContainer.innerHTML += createField(
            "games_played",
            "Gespielte Spiele",
            data.games_played
          );
          fieldsContainer.innerHTML += createField(
            "total_points",
            "Geworfene Punkte Gesamt",
            data.total_points
          );
        } else if (currentMode === "501") {
          fieldsContainer.innerHTML += createField(
            "name",
            "Spieler Name",
            data.name,
            "text"
          );
          fieldsContainer.innerHTML += createField(
            "wins",
            "Legs Won",
            data.wins
          );
          fieldsContainer.innerHTML += createField(
            "games_played",
            "Legs Played",
            data.games_played
          );
          fieldsContainer.innerHTML += createField(
            "total_darts_thrown",
            "Geworfene Darts",
            data.total_darts_thrown
          );
          fieldsContainer.innerHTML += createField(
            "total_score_thrown",
            "Erzielte Punkte",
            data.total_score_thrown
          );
          fieldsContainer.innerHTML += createField(
            "highest_finish",
            "Highest Finish",
            data.highest_finish
          );
          fieldsContainer.innerHTML += createField(
            "best_leg",
            "Best Leg",
            data.best_leg
          );
          fieldsContainer.innerHTML += createField(
            "count_100",
            "100+",
            data.count_100
          );
          fieldsContainer.innerHTML += createField(
            "count_140",
            "140+",
            data.count_140
          );
          fieldsContainer.innerHTML += createField(
            "count_180",
            "180s",
            data.count_180
          );
          fieldsContainer.innerHTML += createField(
            "checkout_attempts",
            "Darts aufs Doppel",
            data.checkout_attempts
          );
          fieldsContainer.innerHTML += createField(
            "checkout_hits",
            "Doppel Getroffen",
            data.checkout_hits
          );
        } else if (currentMode === "bobs") {
          fieldsContainer.innerHTML += createField(
            "name",
            "Spieler Name",
            data.name,
            "text"
          );
          fieldsContainer.innerHTML += createField(
            "final_score",
            "Endstand",
            data.final_score
          );
          fieldsContainer.innerHTML += createField(
            "is_win",
            "Sieg? (true/false)",
            data.is_win,
            "text"
          );
        } else if (currentMode === "rtw") {
          fieldsContainer.innerHTML += createField(
            "name",
            "Spieler Name",
            data.name,
            "text"
          );
          fieldsContainer.innerHTML += createField(
            "total_points",
            "Gesamt Treffer",
            data.total_points
          );
          fieldsContainer.innerHTML += createField(
            "mode",
            "Modus (single/double/triple)",
            data.mode,
            "text"
          );
        }

        document.getElementById("edit-modal").style.display = "flex";
      }

      function closeModal() {
        document.getElementById("edit-modal").style.display = "none";
        editingId = null;
      }

      async function saveData() {
        if (!editingId) return;
        let updatePayload = {};
        let tableName = "";

        if (currentMode === "littler") {
          tableName = "highscores";
          updatePayload.name = document.getElementById("edit_name").value;
          updatePayload.wins =
            parseInt(document.getElementById("edit_wins").value) || 0;
          updatePayload.highscore =
            parseInt(document.getElementById("edit_highscore").value) || 0;
          updatePayload.games_played =
            parseInt(document.getElementById("edit_games_played").value) || 0;
          updatePayload.total_points =
            parseInt(document.getElementById("edit_total_points").value) || 0;
        } else if (currentMode === "501") {
          tableName = "stats_501";
          updatePayload.name = document.getElementById("edit_name").value;
          updatePayload.wins =
            parseInt(document.getElementById("edit_wins").value) || 0;
          updatePayload.games_played =
            parseInt(document.getElementById("edit_games_played").value) || 0;
          updatePayload.total_darts_thrown =
            parseInt(
              document.getElementById("edit_total_darts_thrown").value
            ) || 0;
          updatePayload.total_score_thrown =
            parseInt(
              document.getElementById("edit_total_score_thrown").value
            ) || 0;
          updatePayload.highest_finish =
            parseInt(document.getElementById("edit_highest_finish").value) || 0;
          updatePayload.best_leg =
            parseInt(document.getElementById("edit_best_leg").value) || 0;
          updatePayload.count_100 =
            parseInt(document.getElementById("edit_count_100").value) || 0;
          updatePayload.count_140 =
            parseInt(document.getElementById("edit_count_140").value) || 0;
          updatePayload.count_180 =
            parseInt(document.getElementById("edit_count_180").value) || 0;
          updatePayload.checkout_attempts =
            parseInt(document.getElementById("edit_checkout_attempts").value) ||
            0;
          updatePayload.checkout_hits =
            parseInt(document.getElementById("edit_checkout_hits").value) || 0;
        } else if (currentMode === "bobs") {
          tableName = "stats_bobs";
          updatePayload.name = document.getElementById("edit_name").value;
          updatePayload.final_score =
            parseInt(document.getElementById("edit_final_score").value) || 0;
          updatePayload.is_win =
            document.getElementById("edit_is_win").value.toLowerCase() ===
            "true";
        } else if (currentMode === "rtw") {
          tableName = "stats_rtw";
          updatePayload.name = document.getElementById("edit_name").value;
          updatePayload.total_points =
            parseInt(document.getElementById("edit_total_points").value) || 0;
          updatePayload.mode = document.getElementById("edit_mode").value;
        }

        const { error } = await _supabase
          .from(tableName)
          .update(updatePayload)
          .eq("id", editingId);
        if (error) {
          alert("Fehler beim Speichern: " + error.message);
        } else {
          showToast("Änderungen erfolgreich gespeichert!", "success");
          closeModal();
          loadData();
        }
      }

      // ---> NEU: Die aufgerüstete Delete-Funktion mit dem Custom Modal! <---
      function deleteRecord(id, name, targetTable) {
        showConfirmModal(
          `Willst du den Datensatz "${name}" wirklich unwiderruflich löschen?`,
          async () => {
            const { error } = await _supabase
              .from(targetTable)
              .delete()
              .eq("id", id);

            if (error) {
              showToast("Fehler beim Löschen: " + error.message, "error");
            } else {
              showToast("Erfolgreich gelöscht!", "success");
              loadData();
            }
          }
        );
      }
    </script>
  </body>
</html>
