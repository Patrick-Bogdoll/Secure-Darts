<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure-Darts Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
      :root {
        --bg-color: #1a1a1a;
        --text-color: #f0f0f0;
        --card-bg: #2d2d2d;
        --accent-red: #f44336;
        --accent-blue: #2196f3;
        --accent-green: #4caf50;
      }

      body {
        font-family: sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        width: 100%;
        max-width: 900px;
        background: var(--card-bg);
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      }

      .header-tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }

      .tab-btn {
        flex: 1;
        padding: 12px;
        background: #333;
        border: none;
        color: #aaa;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
      }

      .tab-btn.active {
        background: var(--accent-blue);
        color: white;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }

      th,
      td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #444;
      }

      th {
        background-color: #222;
      }

      .btn-edit,
      .btn-delete {
        padding: 6px 12px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        margin-right: 5px;
      }

      .btn-edit {
        background-color: #ffb300;
        color: #000;
      }
      .btn-delete {
        background-color: var(--accent-red);
        color: white;
      }

      /* --- DAS GROSSE BEARBEITUNGS-MODAL --- */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }

      .modal-content {
        background: var(--card-bg);
        padding: 25px;
        border-radius: 12px;
        width: 90%;
        max-width: 600px;
        border: 2px solid var(--accent-blue);
        max-height: 90vh;
        overflow-y: auto;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-bottom: 25px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        text-align: left;
      }
      .form-group label {
        font-size: 0.85em;
        color: #aaa;
        margin-bottom: 5px;
      }
      .form-group input {
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #555;
        background: #111;
        color: white;
      }
      .form-group input:focus {
        outline: none;
        border-color: var(--accent-blue);
      }

      .modal-actions {
        display: flex;
        gap: 10px;
      }
      .modal-actions button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
      }
      .btn-save {
        background: var(--accent-green);
        color: black;
      }
      .btn-cancel {
        background: #555;
        color: white;
      }

      /* --- HOME BUTTON --- */
      .btn-home {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        background-color: #444;
        color: white;
        padding: 10px 15px;
        border-radius: 6px;
        font-weight: bold;
        transition: 0.3s;
        margin-bottom: 20px;
        cursor: pointer;
      }
      .btn-home:hover {
        background-color: #555;
      }

      /* --- LOGIN OVERLAY --- */
      #login-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--bg-color);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .login-box {
        background: var(--card-bg);
        padding: 40px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        width: 300px;
      }
    </style>
  </head>
  <body>
    <div id="login-overlay">
      <div class="login-box">
        <h2 style="color: var(--accent-blue); margin-top: 0">Admin Login</h2>

        <input
          type="password"
          id="admin-pw"
          placeholder="Passwort"
          style="
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #555;
            background: #111;
            color: white;
            margin-bottom: 20px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
          "
          onkeydown="if(event.key==='Enter') checkPassword()"
        />

        <button
          onclick="checkPassword()"
          style="
            padding: 12px 20px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            box-sizing: border-box;
          "
        >
          Einloggen
        </button>

        <a
          href="index.html"
          class="btn-home"
          style="
            margin-top: 15px;
            width: 100%;
            justify-content: center;
            box-sizing: border-box;
          "
          >🏠 Zurück</a
        >
      </div>
    </div>

    <div class="container" id="admin-container" style="display: none">
      <a href="index.html" class="btn-home">🏠 Zurück zur App</a>

      <h1 style="text-align: center; margin-top: 0">⚙️ Admin Panel</h1>

      <div class="header-tabs">
        <button
          id="tab-littler"
          class="tab-btn active"
          onclick="switchTab('littler')"
        >
          🎯 Secure-Darts (Littler)
        </button>
        <button id="tab-501" class="tab-btn" onclick="switchTab('501')">
          🌍 501 Darts
        </button>
      </div>

      <table id="data-table">
        <thead id="table-head"></thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="edit-modal" class="modal-overlay">
      <div class="modal-content">
        <h2 id="modal-title" style="margin-top: 0; color: var(--accent-blue)">
          Spieler bearbeiten
        </h2>
        <div id="edit-fields" class="form-grid"></div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
          <button class="btn-save" onclick="saveData()">💾 Speichern</button>
        </div>
      </div>
    </div>

    <script>
      // --- SUPABASE SETUP ---
      const SUPABASE_URL = "https://etzkulwnjhkoiklrohbt.supabase.co"; // Deine URL
      const SUPABASE_KEY = "sb_publishable_mSGY3nB8ivTaASBZQass3g_Ri4xOimy"; // Dein Key

      const { createClient } = supabase;
      const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

      // --- LOGIN LOGIK ---
      const ADMIN_HASH =
        "d9cafea78ff95cf59f6925e0707c266b19cffb85a31bbbffd146f38b1f119ba8";

      async function hashPassword(password) {
        const msgBuffer = new TextEncoder().encode(password);
        const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map((b) => b.toString(16).padStart(2, "0")).join("");
      }

      async function checkPassword() {
        const input = document.getElementById("admin-pw").value;
        const hash = await hashPassword(input);

        if (hash === ADMIN_HASH) {
          document.getElementById("login-overlay").style.display = "none";
          document.getElementById("admin-container").style.display = "block";
          loadData(); // Daten erst nach erfolgreichem Login laden!
        } else {
          alert("Falsches Passwort!");
          document.getElementById("admin-pw").value = "";
        }
      }

      // --- ADMIN PANEL LOGIK ---
      let currentMode = "littler";
      let editingId = null;

      function switchTab(mode) {
        currentMode = mode;
        document
          .getElementById("tab-littler")
          .classList.toggle("active", mode === "littler");
        document
          .getElementById("tab-501")
          .classList.toggle("active", mode === "501");
        loadData();
      }

      async function loadData() {
        const tbody = document.querySelector("#data-table tbody");
        const thead = document.getElementById("table-head");
        tbody.innerHTML =
          "<tr><td colspan='5' style='text-align:center;'>Lade Daten...</td></tr>";

        if (currentMode === "littler") {
          thead.innerHTML =
            "<tr><th>ID</th><th>Name</th><th>Siege</th><th>Highscore</th><th>Aktionen</th></tr>";
          const { data, error } = await _supabase
            .from("highscores")
            .select("*")
            .order("id", { ascending: true });
          if (error) return alert("Fehler: " + error.message);

          tbody.innerHTML = "";
          data.forEach((p) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
              <td>${p.id}</td><td><b>${p.name}</b></td><td>${p.wins}</td><td>${
              p.highscore
            }</td>
              <td>
                <button class="btn-edit" onclick="openEditModal(${
                  p.id
                }, '${encodeURIComponent(
              JSON.stringify(p)
            )}')">✏️ Bearbeiten</button>
                <button class="btn-delete" onclick="deleteRecord(${p.id}, '${
              p.name
            }')">🗑️</button>
              </td>`;
            tbody.appendChild(tr);
          });
        } else {
          thead.innerHTML =
            "<tr><th>ID</th><th>Name</th><th>Legs Won</th><th>Avg</th><th>Aktionen</th></tr>";
          const { data, error } = await _supabase
            .from("stats_501")
            .select("*")
            .order("id", { ascending: true });
          if (error) return alert("Fehler: " + error.message);

          tbody.innerHTML = "";
          data.forEach((p) => {
            let avg =
              p.total_darts_thrown > 0
                ? ((p.total_score_thrown / p.total_darts_thrown) * 3).toFixed(2)
                : "0.00";
            const tr = document.createElement("tr");
            tr.innerHTML = `
              <td>${p.id}</td><td><b>${p.name}</b></td><td>${
              p.wins
            }</td><td>${avg}</td>
              <td>
                <button class="btn-edit" onclick="openEditModal(${
                  p.id
                }, '${encodeURIComponent(
              JSON.stringify(p)
            )}')">✏️ Bearbeiten</button>
                <button class="btn-delete" onclick="deleteRecord(${p.id}, '${
              p.name
            }')">🗑️</button>
              </td>`;
            tbody.appendChild(tr);
          });
        }
      }

      function openEditModal(id, encodedData) {
        editingId = id;
        const data = JSON.parse(decodeURIComponent(encodedData));
        const fieldsContainer = document.getElementById("edit-fields");
        fieldsContainer.innerHTML = "";

        const createField = (key, label, value, type = "number") => {
          return `<div class="form-group">
                    <label>${label}</label>
                    <input type="${type}" id="edit_${key}" value="${
            value !== null ? value : ""
          }">
                  </div>`;
        };

        if (currentMode === "littler") {
          fieldsContainer.innerHTML += createField(
            "name",
            "Spieler Name",
            data.name,
            "text"
          );
          fieldsContainer.innerHTML += createField("wins", "Siege", data.wins);
          fieldsContainer.innerHTML += createField(
            "highscore",
            "Highscore",
            data.highscore
          );
          fieldsContainer.innerHTML += createField(
            "games_played",
            "Gespielte Spiele",
            data.games_played
          );
          fieldsContainer.innerHTML += createField(
            "total_points",
            "Geworfene Punkte Gesamt",
            data.total_points
          );
        } else {
          fieldsContainer.innerHTML += createField(
            "name",
            "Spieler Name",
            data.name,
            "text"
          );
          fieldsContainer.innerHTML += createField(
            "wins",
            "Legs Won (Siege)",
            data.wins
          );
          fieldsContainer.innerHTML += createField(
            "games_played",
            "Legs Played (Gesamt)",
            data.games_played
          );
          fieldsContainer.innerHTML += createField(
            "total_darts_thrown",
            "Geworfene Darts Gesamt",
            data.total_darts_thrown
          );
          fieldsContainer.innerHTML += createField(
            "total_score_thrown",
            "Erzielte Punkte Gesamt",
            data.total_score_thrown
          );
          fieldsContainer.innerHTML += createField(
            "highest_finish",
            "Highest Finish",
            data.highest_finish
          );
          fieldsContainer.innerHTML += createField(
            "best_leg",
            "Best Leg (Darts)",
            data.best_leg
          );
          fieldsContainer.innerHTML += createField(
            "count_100",
            "100+ Geworfen",
            data.count_100
          );
          fieldsContainer.innerHTML += createField(
            "count_140",
            "140+ Geworfen",
            data.count_140
          );
          fieldsContainer.innerHTML += createField(
            "count_180",
            "180s Geworfen",
            data.count_180
          );
          fieldsContainer.innerHTML += createField(
            "checkout_attempts",
            "Darts aufs Doppel",
            data.checkout_attempts
          );
          fieldsContainer.innerHTML += createField(
            "checkout_hits",
            "Doppel Getroffen",
            data.checkout_hits
          );
        }

        document.getElementById("edit-modal").style.display = "flex";
      }

      function closeModal() {
        document.getElementById("edit-modal").style.display = "none";
        editingId = null;
      }

      async function saveData() {
        if (!editingId) return;

        let updatePayload = {};

        if (currentMode === "littler") {
          updatePayload.name = document.getElementById("edit_name").value;
          updatePayload.wins =
            parseInt(document.getElementById("edit_wins").value) || 0;
          updatePayload.highscore =
            parseInt(document.getElementById("edit_highscore").value) || 0;
          updatePayload.games_played =
            parseInt(document.getElementById("edit_games_played").value) || 0;
          updatePayload.total_points =
            parseInt(document.getElementById("edit_total_points").value) || 0;
        } else {
          updatePayload.name = document.getElementById("edit_name").value;
          updatePayload.wins =
            parseInt(document.getElementById("edit_wins").value) || 0;
          updatePayload.games_played =
            parseInt(document.getElementById("edit_games_played").value) || 0;
          updatePayload.total_darts_thrown =
            parseInt(
              document.getElementById("edit_total_darts_thrown").value
            ) || 0;
          updatePayload.total_score_thrown =
            parseInt(
              document.getElementById("edit_total_score_thrown").value
            ) || 0;
          updatePayload.highest_finish =
            parseInt(document.getElementById("edit_highest_finish").value) || 0;
          updatePayload.best_leg =
            parseInt(document.getElementById("edit_best_leg").value) || 0;
          updatePayload.count_100 =
            parseInt(document.getElementById("edit_count_100").value) || 0;
          updatePayload.count_140 =
            parseInt(document.getElementById("edit_count_140").value) || 0;
          updatePayload.count_180 =
            parseInt(document.getElementById("edit_count_180").value) || 0;
          updatePayload.checkout_attempts =
            parseInt(document.getElementById("edit_checkout_attempts").value) ||
            0;
          updatePayload.checkout_hits =
            parseInt(document.getElementById("edit_checkout_hits").value) || 0;
        }

        const tableName =
          currentMode === "littler" ? "highscores" : "stats_501";
        const { error } = await _supabase
          .from(tableName)
          .update(updatePayload)
          .eq("id", editingId);

        if (error) {
          alert("Fehler beim Speichern: " + error.message);
        } else {
          closeModal();
          loadData();
        }
      }

      async function deleteRecord(id, name) {
        if (!confirm(`Willst du "${name}" wirklich unwiderruflich LÖSCHEN?`))
          return;
        const tableName =
          currentMode === "littler" ? "highscores" : "stats_501";
        const { error } = await _supabase.from(tableName).delete().eq("id", id);

        if (error) alert("Fehler beim Löschen: " + error.message);
        else loadData();
      }
    </script>
  </body>
</html>
