<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure-Darts Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css" />
    <style>
      .admin-table-container {
        overflow-x: auto;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 8px;
        padding: 10px;
        margin-top: 20px;
      }
      th {
        color: var(--accent-blue);
      }
    </style>
  </head>
  <body>
    <div
      id="toast-container"
      style="
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 999999;
        display: flex;
        flex-direction: column;
        gap: 10px;
      "
    ></div>

    <div
      id="generic-confirm-modal"
      class="modal-overlay"
      style="z-index: 100000; align-items: center"
    >
      <div
        class="modal-content accent-red"
        style="text-align: center; max-width: 350px"
      >
        <h2 style="color: var(--accent-red); margin-top: 0">Achtung!</h2>
        <p
          id="generic-confirm-text"
          style="color: var(--text-muted); margin-bottom: 25px"
        >
          Möchtest du das wirklich tun?
        </p>
        <div style="display: flex; gap: 10px; flex-direction: column">
          <button
            id="generic-confirm-yes-btn"
            class="primary accent-red"
            style="
              background: var(--accent-red);
              color: white;
              border: none;
              margin: 0;
              text-align: center;
              justify-content: center;
            "
          >
            UNWIDERRUFLICH LÖSCHEN
          </button>
          <button onclick="closeConfirmModal()" class="reset" style="margin: 0">
            ABBRECHEN
          </button>
        </div>
      </div>
    </div>

    <div
      id="login-overlay"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--bg-dark);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      "
    >
      <div
        class="glass-panel accent-blue"
        style="text-align: center; width: 320px; padding: 40px"
      >
        <h2 style="color: var(--accent-blue); margin-top: 0">ADMIN LOGIN</h2>
        <input
          type="password"
          id="admin-pw"
          placeholder="Passwort"
          style="margin-bottom: 20px; text-align: center"
          onkeydown="if(event.key==='Enter') checkPassword()"
        />
        <button
          class="primary accent-blue"
          onclick="checkPassword()"
          style="margin: 0; text-align: center; justify-content: center"
        >
          EINLOGGEN
        </button>
        <a
          href="index.html"
          class="reset"
          style="
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-sizing: border-box;
          "
          >ZURÜCK ZUR APP</a
        >
      </div>
    </div>

    <div
      class="container glass-panel accent-purple"
      id="admin-container"
      style="display: none; max-width: 1100px"
    >
      <a
        href="index.html"
        class="reset"
        style="
          display: inline-flex;
          align-items: center;
          gap: 8px;
          text-decoration: none;
          width: auto;
          margin-top: 0;
          margin-bottom: 20px;
        "
      >
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        ZURÜCK ZUR APP
      </a>

      <h1
        style="text-align: center; margin-top: 0; color: var(--accent-purple)"
      >
        ADMIN PANEL
      </h1>

      <div class="modal-tabs" style="flex-wrap: wrap">
        <button
          id="tab-secure"
          class="modal-tab active"
          onclick="switchTab('secure')"
        >
          SECURE
        </button>
        <button id="tab-501" class="modal-tab" onclick="switchTab('501')">
          501
        </button>
        <button id="tab-bobs" class="modal-tab" onclick="switchTab('bobs')">
          BOB'S
        </button>
        <button id="tab-rtw" class="modal-tab" onclick="switchTab('rtw')">
          RTW
        </button>
        <button
          id="tab-contact"
          class="modal-tab"
          onclick="switchTab('contact')"
        >
          NACHRICHTEN
        </button>
      </div>

      <div class="admin-table-container">
        <table id="data-table">
          <thead id="table-head"></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div id="edit-modal" class="modal-overlay" style="align-items: center">
      <div class="modal-content accent-blue">
        <h2 id="modal-title" style="margin-top: 0; color: var(--accent-blue)">
          DATEN BEARBEITEN
        </h2>
        <div
          id="edit-fields"
          style="
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
          "
        ></div>
        <div style="display: flex; gap: 10px">
          <button
            class="reset"
            style="flex: 1; margin: 0"
            onclick="closeModal()"
          >
            ABBRECHEN
          </button>
          <button
            class="primary accent-green"
            style="
              flex: 1;
              margin: 0;
              text-align: center;
              justify-content: center;
            "
            onclick="saveData()"
          >
            SPEICHERN
          </button>
        </div>
      </div>
    </div>

    <script>
      const SUPABASE_URL = "https://etzkulwnjhkoiklrohbt.supabase.co";
      const SUPABASE_KEY = "sb_publishable_mSGY3nB8ivTaASBZQass3g_Ri4xOimy";
      const { createClient } = supabase;
      const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
      const ADMIN_HASH =
        "411a8ae4387cb1077524281d32778cca04c2840103bf87cb1abef7b7404d443d";

      let currentMode = "secure";
      let editingId = null;

      function showToast(message, type = "success") {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");
        const borderColor =
          type === "success" ? "var(--accent-green)" : "var(--accent-red)";

        toast.style.cssText = `background: var(--glass-bg); color: var(--text-main); border: 1px solid var(--glass-border); border-left: 4px solid ${borderColor}; padding: 12px 20px; border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); font-weight: bold; font-size: 0.9em; transform: translateX(120%); transition: transform 0.4s ease-out;`;
        toast.innerHTML = `<span>${message}</span>`;
        container.appendChild(toast);
        requestAnimationFrame(() => (toast.style.transform = "translateX(0)"));
        setTimeout(() => {
          toast.style.transform = "translateX(120%)";
          setTimeout(() => toast.remove(), 400);
        }, 2500);
      }

      async function hashPassword(password) {
        const msgBuffer = new TextEncoder().encode(password);
        const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
        return Array.from(new Uint8Array(hashBuffer))
          .map((b) => b.toString(16).padStart(2, "0"))
          .join("");
      }

      async function checkPassword() {
        const input = document.getElementById("admin-pw").value;
        if ((await hashPassword(input)) === ADMIN_HASH) {
          document.getElementById("login-overlay").style.display = "none";
          document.getElementById("admin-container").style.display = "block";
          loadData();
        } else {
          showToast("Falsches Passwort!", "error");
        }
      }

      function switchTab(mode) {
        currentMode = mode;
        document.querySelectorAll(".modal-tab").forEach((btn) => {
          btn.classList.toggle("active", btn.id === `tab-${mode}`);
        });
        loadData();
      }

      async function loadData() {
        const tbody = document.querySelector("#data-table tbody");
        const thead = document.getElementById("table-head");
        tbody.innerHTML =
          "<tr><td colspan='6' style='text-align:center; color: var(--text-muted);'>Lade Daten...</td></tr>";

        let tableName =
          currentMode === "secure"
            ? "stats_secure"
            : currentMode === "501"
            ? "stats_501"
            : currentMode === "bobs"
            ? "stats_bobs"
            : currentMode === "rtw"
            ? "stats_rtw"
            : "contact_messages";
        const { data, error } = await _supabase
          .from(tableName)
          .select("*")
          .order(currentMode === "contact" ? "created_at" : "id", {
            ascending: currentMode !== "contact",
          });

        if (error) return showToast("Fehler: " + error.message, "error");
        tbody.innerHTML = "";

        if (currentMode === "contact") {
          // Aktionen-Header rechtsbündig
          thead.innerHTML =
            "<tr><th>Datum</th><th>Name</th><th>E-Mail</th><th>Nachricht</th><th style='text-align: right;'>Aktionen</th></tr>";
          data.forEach((p) => {
            let date = new Date(p.created_at).toLocaleString("de-DE", {
              day: "2-digit",
              month: "2-digit",
              year: "numeric",
              hour: "2-digit",
              minute: "2-digit",
            });
            const tr = document.createElement("tr");
            tr.innerHTML = `<td style="font-size: 0.8em; color: var(--text-muted);">${date}</td>
                            <td><b>${p.name || "-"}</b></td>
                            <td><a href="mailto:${
                              p.email
                            }" style="color:var(--accent-blue)">${
              p.email
            }</a></td>
                            <td style="max-width:350px; white-space:pre-wrap; font-size: 0.9em;">${
                              p.message
                            }</td>
                            <td style="text-align: right;"><button class="reset" style="margin:0; padding: 6px 12px; font-size: 0.8em; color: var(--accent-red); border-color: var(--accent-red);" onclick="deleteRecord(${
                              p.id
                            }, 'Nachricht von ${
              p.name
            }', 'contact_messages')">DEL</button></td>`;
            tbody.appendChild(tr);
          });
        } else {
          const is501 = currentMode === "501";
          // Aktionen-Header rechtsbündig für alle Tabellen
          thead.innerHTML = is501
            ? "<tr><th>ID</th><th>Name</th><th>Legs Won</th><th>Avg</th><th style='text-align: right;'>Aktionen</th></tr>"
            : currentMode === "secure"
            ? "<tr><th>ID</th><th>Name</th><th>Siege</th><th>Highscore</th><th style='text-align: right;'>Aktionen</th></tr>"
            : "<tr><th>ID</th><th>Name</th><th>Wert</th><th>Info</th><th style='text-align: right;'>Aktionen</th></tr>";

          data.forEach((p) => {
            const tr = document.createElement("tr");
            let col3 = is501
              ? p.wins
              : currentMode === "secure"
              ? p.wins
              : currentMode === "bobs"
              ? p.final_score
              : p.total_points;
            let col4 = is501
              ? p.total_darts_thrown > 0
                ? ((p.total_score_thrown / p.total_darts_thrown) * 3).toFixed(2)
                : "0.00"
              : currentMode === "secure"
              ? p.highscore
              : currentMode === "bobs"
              ? p.is_win
                ? "Sieg"
                : "Bust"
              : p.mode;

            tr.innerHTML = `<td>${p.id}</td>
                            <td><b>${p.name}</b></td>
                            <td>${col3}</td>
                            <td>${col4}</td>
                            <td style="display:flex; gap:5px; justify-content: flex-end;">
                              <button class="primary accent-blue" style="margin:0; padding: 6px 12px; width:auto; font-size: 0.8em;" onclick="openEditModal(${
                                p.id
                              }, '${encodeURIComponent(
              JSON.stringify(p)
            )}')">EDIT</button>
                              <button class="reset" style="margin:0; padding: 6px 12px; width:auto; font-size: 0.8em; color: var(--accent-red); border-color: var(--accent-red);" onclick="deleteRecord(${
                                p.id
                              }, '${p.name}', '${tableName}')">DEL</button>
                            </td>`;
            tbody.appendChild(tr);
          });
        }
      }

      function openEditModal(id, encodedData) {
        editingId = id;
        const data = JSON.parse(decodeURIComponent(encodedData));
        const container = document.getElementById("edit-fields");
        container.innerHTML = "";
        Object.keys(data).forEach((key) => {
          if (["id", "created_at", "user_id"].includes(key)) return;
          container.innerHTML += `<div style="display: flex; flex-direction: column; text-align: left;">
                                    <label style="font-size: 0.8em; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase;">${key}</label>
                                    <input type="text" id="edit_${key}" value="${
            data[key] || ""
          }">
                                  </div>`;
        });
        document.getElementById("edit-modal").style.display = "flex";
      }

      async function saveData() {
        let tableName =
          currentMode === "secure"
            ? "stats_secure"
            : currentMode === "501"
            ? "stats_501"
            : currentMode === "bobs"
            ? "stats_bobs"
            : "stats_rtw";
        let payload = {};
        document.querySelectorAll("#edit-fields input").forEach((input) => {
          let key = input.id.replace("edit_", "");
          payload[key] =
            isNaN(input.value) || input.value === ""
              ? input.value
              : parseFloat(input.value);
        });
        const { error } = await _supabase
          .from(tableName)
          .update(payload)
          .eq("id", editingId);
        if (error) showToast(error.message, "error");
        else {
          showToast("Erfolgreich gespeichert!", "success");
          closeModal();
          loadData();
        }
      }

      function closeModal() {
        document.getElementById("edit-modal").style.display = "none";
      }
      function closeConfirmModal() {
        document.getElementById("generic-confirm-modal").style.display = "none";
      }

      function deleteRecord(id, name, table) {
        document.getElementById(
          "generic-confirm-text"
        ).innerText = `"${name}" wirklich löschen?`;
        document.getElementById("generic-confirm-modal").style.display = "flex";
        document.getElementById("generic-confirm-yes-btn").onclick =
          async () => {
            const { error } = await _supabase.from(table).delete().eq("id", id);
            if (error) showToast(error.message, "error");
            else {
              showToast("Erfolgreich gelöscht!", "success");
              closeConfirmModal();
              loadData();
            }
          };
      }

      async function verifyAdmin() {
        const {
          data: { session },
        } = await _supabase.auth.getSession();
        if (!session) window.location.href = "index.html";
        const { data } = await _supabase
          .from("stats_501")
          .select("is_admin")
          .eq("user_id", session.user.id)
          .maybeSingle();
        if (!data?.is_admin) window.location.href = "index.html";
      }
      verifyAdmin();
    </script>
  </body>
</html>
